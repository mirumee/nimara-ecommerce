# Lychee config for the Nimara docs link checker.

# Resolve root-relative links (e.g. "/", "/running-locally", "/img/logo.svg")
# against the built docs directory. Lychee checks the corresponding file
# exists on disk, which also validates static assets that Docusaurus itself
# does not check.
base = "apps/docs/build"

# GitHub Pages serves "/foo" by returning "foo.html". Tell lychee to try the
# same fallback when resolving local files.
fallback_extensions = ["html"]

# Validate canonical/og:url/sitemap links against the build produced in this
# PR rather than the currently-deployed production site. Without this, every
# canonical URL emitted by Docusaurus 404s until the PR is merged & deployed.
remap = [
  "https://docs.nimara.store/(.*) apps/docs/build/$1",
]

accept = ["200..=204", "206", "429"]

max_retries = 2
retry_wait_time = 2
timeout = 20
max_concurrency = 8

cache = true
max_cache_age = "1d"

exclude = [
  "^http://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "^https?://example\\.com",
]
