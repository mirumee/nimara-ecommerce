mutation OrderLinesCreateMutation($id: ID!, $input: [OrderLineCreateInput!]!) {
  orderLinesCreate(id: $id, input: $input) {
    order {
      id
      number
      status
    }
    orderLines {
      id
      quantity
      variant {
        id
      }
    }
    errors {
      field
      message
      code
    }
  }
}

