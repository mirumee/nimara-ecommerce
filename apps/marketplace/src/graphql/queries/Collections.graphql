query CollectionsList(
  $first: Int = 100
  $after: String
  $filter: CollectionFilterInput
) {
  collections(first: $first, after: $after, filter: $filter) {
    edges {
      node {
        id
        name
        slug
        backgroundImage {
          url
          alt
        }
        products {
          totalCount
        }
        channelListings {
          channel {
            id
            name
          }
          isPublished
        }
      }
      cursor
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}
