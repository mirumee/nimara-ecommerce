query VendorsList(
  $first: Int
  $last: Int
  $after: String
  $before: String
  $filter: CustomerFilterInput
  $sortBy: UserSortingInput
  $search: String
) {
  customers(
    first: $first
    last: $last
    after: $after
    before: $before
    filter: $filter
    sortBy: $sortBy
    search: $search
  ) {
    edges {
      node {
        id
        email
        firstName
        lastName
        isActive
        dateJoined
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
