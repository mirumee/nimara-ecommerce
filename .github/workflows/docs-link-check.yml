name: Docs Link Check

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - "apps/docs/**"
      - ".github/workflows/docs-link-check.yml"

permissions:
  contents: read

concurrency:
  group: docs-link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Build docs and check links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        working-directory: apps/docs
        run: pnpm install --frozen-lockfile

      # Internal links and anchors are validated here:
      # docusaurus.config.ts sets onBrokenLinks / onBrokenMarkdownLinks /
      # onBrokenAnchors to "throw", so this step fails on any broken
      # internal reference.
      - name: Build docs (validates internal links)
        working-directory: apps/docs
        run: pnpm build

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ hashFiles('apps/docs/lychee.toml') }}
          restore-keys: cache-lychee-
          save-always: true

      # Install lychee directly — `lycheeverse/lychee-action@v2` defaults to
      # v0.23.0 (we need v0.24+ for the `--root-dir` flag) and is currently
      # broken with v0.24+ tarball layout.
      - name: Install lychee
        env:
          LYCHEE_VERSION: v0.24.2
        run: |
          curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp lychee-x86_64-unknown-linux-gnu/lychee --strip-components=1
          sudo install -m 0755 /tmp/lychee /usr/local/bin/lychee
          lychee --version

      - name: Check external links with lychee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lychee \
            --config apps/docs/lychee.toml \
            --root-dir "${GITHUB_WORKSPACE}/apps/docs/build" \
            --no-progress \
            'apps/docs/build/**/*.html'
