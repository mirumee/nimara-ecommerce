name: Deploy Docs to GitHub Pages

on:
  # Run after the Release workflow finishes. semantic-release creates version
  # tags using the default GITHUB_TOKEN, and GitHub deliberately does not start
  # new workflow runs from events generated by that token. A `push: tags`
  # trigger would therefore never fire for automated releases, so we chain off
  # the Release workflow completion instead.
  workflow_run:
    workflows:
      - "Release"
    types:
      - completed
  push:
    # Pages serves a single site and the github-pages environment only permits
    # the main branch to deploy, so we only build/deploy docs from main.
    branches:
      - main
    paths:
      - "apps/docs/**"
    # Manually pushed version tags still trigger a build (GITHUB_TOKEN tags are
    # handled by the workflow_run trigger above).
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # For workflow_run events, only build when the Release workflow succeeded.
    # All other triggers (push, manual tag, workflow_dispatch) always build.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/krypton"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        working-directory: apps/docs
        run: pnpm install --frozen-lockfile

      - name: Build docs
        working-directory: apps/docs
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/build

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
