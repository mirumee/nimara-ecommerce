mutation UCPCheckoutSessionUpdate(
  $checkoutId: ID!
  # Shipping address
  $shippingAddress: AddressInput!
  $shouldUpdateShipping: Boolean!
  # Billing address
  $billingAddress: AddressInput!
  $shouldUpdateBilling: Boolean!
  # Buyer
  $buyerEmail: String!
  $metadata: [MetadataInput!]!
  $shouldUpdateEmail: Boolean!
  # Fulfillment
  $fulfillmentOptionID: ID!
  $shouldUpdateFulfillmentOption: Boolean!
) {
  checkoutEmailUpdate(checkoutId: $checkoutId, email: $buyerEmail)
    @include(if: $shouldUpdateEmail) {
    checkout {
      email
    }
    errors {
      field
      message
      code
    }
  }

  checkoutShippingAddressUpdate(
    checkoutId: $checkoutId
    shippingAddress: $shippingAddress
  ) @include(if: $shouldUpdateShipping) {
    checkout {
      shippingAddress {
        ...AddressFragment
      }
    }
    errors {
      field
      message
      code
      addressType
    }
  }

  checkoutBillingAddressUpdate(
    id: $checkoutId
    billingAddress: $billingAddress
  ) @include(if: $shouldUpdateBilling) {
    errors {
      field
      message
      code
      addressType
    }
  }

  checkoutDeliveryMethodUpdate(
    deliveryMethodId: $fulfillmentOptionID
    id: $checkoutId
  ) @include(if: $shouldUpdateFulfillmentOption) {
    errors {
      field
      message
      code
    }
  }

  updateMetadata(id: $checkoutId, input: $metadata) {
    errors {
      field
      message
      code
    }
  }
}
