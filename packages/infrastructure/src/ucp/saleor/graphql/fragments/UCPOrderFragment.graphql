fragment UCPOrderFragment on Order {
  id
  checkoutId
  created
  status
  paymentStatus
  displayGrossPrices
  metadata {
    key
    value
  }
  fulfillments {
    id
    status
  }
  lines {
    id
    quantity
    quantityFulfilled
    productName
    variantName
    productVariantId
    discounts {
      total {
        ...MoneyFragment
      }
    }
    unitPrice {
      ...TaxedMoneyFragment
    }
    totalPrice {
      ...TaxedMoneyFragment
    }
  }
  shippingAddress {
    ...AddressFragment
  }
  billingAddress {
    ...AddressFragment
  }
}

